    <div class="main-content">
        <div class="container">
            <h1>Tableau de Bord Professeur</h1>
            
            <div class="tabs">
                <button class="tabs-btn active" onclick="showTab('notifications')">📢 Notifications</button>
                <button class="tabs-btn" onclick="showTab('parcours')">🎓 Parcours</button>
                <button class="tabs-btn" onclick="showTab('documents')">📄 Documents</button>
            </div>

            <!-- ONGLET: NOTIFICATIONS -->
            <div id="notifications" class="tabs-content active">
                <div class="form-section">
                    <h3>Envoyer un Communiqué</h3>
                    <form>
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" placeholder="Tapez votre communiqué ici..."></textarea>
                        <button type="submit" class="button-success">📤 Envoyer</button>
                    </form>
                </div>
            </div>

            <!-- ONGLET: PARCOURS -->
            <div id="parcours" class="tabs-content">
                <div class="filiere">
                    <h3>Sélectionner un Parcours</h3>
                    <form>
                        <label for="parcours-select">Parcours:</label>
                        <select id="parcours-select" name="parcours">
                            <option value="">-- Choisir un parcours --</option>
                            <option value="GIN">GIN - Génie Informatique</option>
                            <option value="GBIO">GBIO - Génie Biologie</option>
                            <option value="GEL">GEL - Génie Électrique</option>
                        </select>
                        
                        <label for="filiere-select" style="margin-top: 15px;">Filière:</label>
                        <select id="filiere-select" name="filiere">
                            <option value="">-- Choisir une filière --</option>
                            <option value="glo">GLO - Génie Logiciel</option>
                            <option value="rt">RT - Réseaux & Télécomunications</option>
                            <option value="IA">IA - Intelligence Artificielle</option>
                            <option value="IAB">IAB - IA & Big Data</option>
                            <option value="MIP">MIP - Mathématiques & Informatique</option>
                        </select>
                        
                        <button type="submit" class="button-success" style="margin-top: 15px;">✓ Confirmer</button>
                    </form>
                </div>
            </div>

            <!-- ONGLET: DOCUMENTS -->
            <div id="documents" class="tabs-content">
                <div class="form-section">
                    <h3>Envoyer le Support de Cours/TD</h3>
                    <form>
                        <label for="file-upload">Sélectionner un fichier:</label>
                        <input type="file" id="file-upload" name="file">
                        
                        <label for="course-select" style="margin-top: 15px;">Type de document:</label>
                        <select id="course-select" name="type">
                            <option value="">-- Choisir --</option>
                            <option value="cours">Support de Cours</option>
                            <option value="td">Fiche TD</option>
                            <option value="examen">Examen</option>
                        </select>
                        
                        <button type="submit" class="button-success" style="margin-top: 15px;">📤 Envoyer</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabName) {
            // Masquer tous les onglets
            const tabs = document.querySelectorAll('.tabs-content');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            // Désactiver tous les boutons
            const buttons = document.querySelectorAll('.tabs-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Afficher l'onglet sélectionné
            document.getElementById(tabName).classList.add('active');
            
            // Activer le bouton correspondant
            event.target.classList.add('active');
        }
    </script>
</body>
